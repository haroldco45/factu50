<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Distrileco - Dashboard de Facturación</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen">

    <nav class="bg-blue-800 text-white p-5 shadow-xl flex justify-between items-center">
        <div>
            <h1 class="text-xl font-black italic uppercase">Distrileco</h1>
            <p class="text-[10px] opacity-70">Control Comercial · PyG50</p>
        </div>
        <div id="status" class="text-[9px] bg-blue-900 px-3 py-1 rounded-full border border-blue-400 animate-pulse">
            CONECTANDO...
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-4">
        
        <div class="grid grid-cols-2 gap-3 mb-6">
            <button onclick="sincronizar()" class="bg-orange-600 text-white font-bold p-4 rounded-2xl shadow-lg active:scale-95 transition-all text-xs">
                🔄 1. CARGA MASIVA (PYG50)
            </button>
            <button onclick="consultar()" class="bg-white border-2 border-blue-800 text-blue-800 font-bold p-4 rounded-2xl shadow-md active:scale-95 transition-all text-xs">
                📊 2. VER REPORTE MARZO
            </button>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-6">
            <div class="bg-white p-5 rounded-3xl shadow-sm border-b-4 border-emerald-500 text-center">
                <p class="text-slate-400 text-[10px] font-bold uppercase">Total Marzo</p>
                <p id="tNeto" class="text-2xl font-black text-slate-800">$ 0</p>
            </div>
            <div class="bg-white p-5 rounded-3xl shadow-sm border-b-4 border-blue-600 text-center">
                <p class="text-slate-400 text-[10px] font-bold uppercase">Facturas</p>
                <p id="tCant" class="text-2xl font-black text-slate-800">0</p>
            </div>
        </div>

        <div class="bg-white rounded-3xl shadow-2xl overflow-hidden border border-slate-200">
            <table class="w-full text-left text-sm">
                <thead class="bg-slate-100 text-slate-500 text-[10px] font-bold uppercase">
                    <tr>
                        <th class="p-4">Factura</th>
                        <th class="p-4">Cliente (Distrileco)</th>
                        <th class="p-4 text-right">Valor</th>
                    </tr>
                </thead>
                <tbody id="cuerpo" class="divide-y divide-slate-100">
                    <tr><td colspan="3" class="p-10 text-center text-slate-400 italic">Esperando comando...</td></tr>
                </tbody>
            </table>
        </div>

        <div id="debug" class="mt-6 p-4 bg-black text-emerald-400 font-mono text-[9px] rounded-xl overflow-x-auto">
            > Sistema Vibras Positivas listo...
        </div>

    </main>

    <footer class="mt-10 p-8 text-center text-slate-400 text-[10px]">
        <p class="font-bold">App desarrollada por Vibras Positivas</p>
        <p>Derechos de autor (3117700431)</p>
    </footer>

    <script>
        const CFG = {
            base: "https://app.nexusai.com.co/ia/api",
            key: "3010d9ca2f0fec14cfe6bfaa8a9fc3d54249ef15a2ccf729d27d9ea7e26b0c12",
            tercero: "5e8883a1-6a7e-4cfa-92ea-fafde465a3d9",
            // ESTO ES LO QUE FALTA: El bypass de seguridad para GitHub
            proxy: "https://api.allorigins.win/raw?url="
        };

        function log(msg) {
            document.getElementById('debug').innerHTML += `<br>> ${msg}`;
            console.log(msg);
        }

        async function sincronizar() {
            log("Iniciando Carga Masiva...");
            const url = `${CFG.base}/business/terceros/carga-masiva?terceroId=${CFG.tercero}&db=pyg50&periodo=202603`;
            
            try {
                const res = await fetch(CFG.proxy + encodeURIComponent(url), {
                    method: 'GET', // Usamos GET vía proxy para saltar CORS
                    headers: { 'x-api-key': CFG.key }
                });
                if(res.ok) alert("Sincronización enviada. Ahora consulta el reporte.");
            } catch (e) { log("Error Carga: " + e.message); }
        }

        async function consultar() {
            const cuerpo = document.getElementById('cuerpo');
            cuerpo.innerHTML = '<tr><td colspan="3" class="p-10 text-center animate-pulse text-blue-600 font-bold">CONSULTANDO PYG50...</td></tr>';
            
            const url = `${CFG.base}/consultas/factu50?terceroId=${CFG.tercero}&periodo=202603&db=pyg50`;
            
            try {
                log("Consultando reporte...");
                const res = await fetch(CFG.proxy + encodeURIComponent(url), {
                    headers: { 'x-api-key': CFG.key }
                });
                
                const data = await res.json();
                const lista = data.data || data.result || (Array.isArray(data) ? data : []);
                
                render(lista);
                document.getElementById('status').innerText = "CONECTADO";
                document.getElementById('status').classList.remove('animate-pulse');
            } catch (e) {
                log("Error Consulta: " + e.message);
                cuerpo.innerHTML = '<tr><td colspan="3" class="p-10 text-center text-red-500 font-bold uppercase text-xs">Error de comunicación con Nexus</td></tr>';
            }
        }

        function render(lista) {
            const tabla = document.getElementById('cuerpo');
            tabla.innerHTML = '';
            let suma = 0;

            if(lista.length === 0) {
                tabla.innerHTML = '<tr><td colspan="3" class="p-10 text-center text-slate-400">No hay datos en pyg50 para marzo.</td></tr>';
                return;
            }

            lista.forEach(i => {
                const v = parseFloat(i.total || i.valor || 0);
                suma += v;
                tabla.innerHTML += `
                    <tr class="hover:bg-blue-50">
                        <td class="p-4 font-black text-slate-800">${i.numero || i.factura}</td>
                        <td class="p-4 text-[10px] font-bold uppercase text-slate-600">${i.cliente || 'CLIENTE'}</td>
                        <td class="p-4 text-right font-black text-blue-800">$${v.toLocaleString()}</td>
                    </tr>`;
            });

            document.getElementById('tNeto').innerText = `$ ${suma.toLocaleString()}`;
            document.getElementById('tCant').innerText = lista.length;
            log(`Éxito: ${lista.length} registros cargados.`);
        }
    </script>
</body>
</html>
