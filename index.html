<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Distrileco - PyG50</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0f172a] text-slate-200 min-h-screen font-sans">

    <nav class="bg-blue-600 p-4 shadow-2xl flex justify-between items-center border-b border-blue-400">
        <div class="flex items-center gap-3">
            <div class="bg-white p-1 rounded-lg">
                <span class="text-blue-700 font-black text-xl italic px-2">D</span>
            </div>
            <div>
                <h1 class="text-lg font-black uppercase tracking-tight leading-none">Distrileco</h1>
                <p class="text-[9px] font-bold text-blue-200 uppercase tracking-widest">Control Comercial · 2026</p>
            </div>
        </div>
        <div class="text-[9px] text-right font-mono bg-blue-700 px-3 py-1 rounded-full border border-blue-400">
            ESTADO: <span id="connStatus" class="text-yellow-400 animate-pulse font-bold">ESPERANDO</span>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-4">
        
        <div class="grid grid-cols-2 gap-4 mb-6">
            <button onclick="conectarNexus('POST')" class="bg-orange-500 hover:bg-orange-600 text-white font-black py-4 rounded-2xl shadow-lg active:scale-95 transition-all text-xs border-b-4 border-orange-700">
                🚀 1. SINCRONIZAR PYG50
            </button>
            <button onclick="conectarNexus('GET')" class="bg-slate-800 hover:bg-slate-700 border-2 border-blue-500 text-blue-400 font-black py-4 rounded-2xl shadow-md active:scale-95 transition-all text-xs">
                📊 2. ACTUALIZAR REPORTE
            </button>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-6">
            <div class="bg-slate-800 p-5 rounded-3xl border border-slate-700 shadow-inner">
                <p class="text-emerald-400 text-[10px] font-black uppercase mb-1">Total Marzo</p>
                <p id="neto" class="text-2xl font-black text-white">$ 0</p>
            </div>
            <div class="bg-slate-800 p-5 rounded-3xl border border-slate-700 shadow-inner">
                <p class="text-blue-400 text-[10px] font-black uppercase mb-1">Facturas</p>
                <p id="cant" class="text-2xl font-black text-white">0</p>
            </div>
        </div>

        <div class="bg-slate-800 rounded-3xl shadow-2xl overflow-hidden border border-slate-700">
            <table class="w-full text-left text-sm">
                <thead class="bg-slate-700 text-slate-400 text-[10px] font-black uppercase tracking-widest">
                    <tr>
                        <th class="p-4">Factura</th>
                        <th class="p-4">Tercero (pyg50)</th>
                        <th class="p-4 text-right">Valor</th>
                    </tr>
                </thead>
                <tbody id="cuerpo" class="divide-y divide-slate-700">
                    <tr><td colspan="3" class="p-16 text-center text-slate-500 italic">Presiona un botón para iniciar...</td></tr>
                </tbody>
            </table>
        </div>

        <div id="debug" class="mt-6 p-4 bg-black text-emerald-500 font-mono text-[9px] rounded-xl border border-slate-800 overflow-y-auto h-24">
            > Sistema de Control Distrileco Iniciado...
        </div>

    </main>

    <footer class="mt-10 p-8 text-center text-slate-500 text-[10px]">
        <p class="font-black text-blue-500 italic uppercase tracking-tighter">App desarrollada por Vibras Positivas</p>
        <p class="mt-1">Derechos de autor &copy; 2026 | Contacto: 3117700431</p>
    </footer>

    <script>
        const CFG = {
            base: "https://app.nexusai.com.co/ia/api",
            key: "3010d9ca2f0fec14cfe6bfaa8a9fc3d54249ef15a2ccf729d27d9ea7e26b0c12",
            tercero: "5e8883a1-6a7e-4cfa-92ea-fafde465a3d9",
            // Proxy alternativo más estable
            bridge: "https://api.allorigins.win/get?url="
        };

        function log(msg) {
            const d = document.getElementById('debug');
            d.innerHTML += `<br>> ${msg}`;
            d.scrollTop = d.scrollHeight;
        }

        async function conectarNexus(metodo) {
            const cuerpo = document.getElementById('cuerpo');
            const status = document.getElementById('connStatus');
            
            cuerpo.innerHTML = '<tr><td colspan="3" class="p-16 text-center text-blue-400 font-bold animate-pulse">CARGANDO DATOS...</td></tr>';
            status.innerText = "CONECTANDO";
            
            const endpoint = (metodo === 'POST') ? "/business/terceros/carga-masiva" : "/consultas/factu50";
            const targetUrl = `${CFG.base}${endpoint}?terceroId=${CFG.tercero}&periodo=202603&db=pyg50`;
            
            log(`Solicitando ${metodo} a Nexus AI...`);

            try {
                // Bridge para saltar el error "Failed to fetch"
                const response = await fetch(CFG.bridge + encodeURIComponent(targetUrl));
                const resJson = await response.json();
                
                // Procesar respuesta
                const data = JSON.parse(resJson.contents);
                log("Conexión exitosa. Procesando JSON.");
                
                if (metodo === 'POST') {
                    alert("¡Carga Masiva de Marzo completada!");
                    conectarNexus('GET');
                } else {
                    renderTable(data);
                    status.innerText = "ACTIVO";
                    status.classList.remove('animate-pulse');
                    status.classList.replace('text-yellow-400', 'text-emerald-400');
                }
            } catch (err) {
                log(`ERROR: ${err.message}`);
                status.innerText = "FALLIDO";
                cuerpo.innerHTML = '<tr><td colspan="3" class="p-16 text-center text-red-500 font-bold">⚠️ ERROR DE CONEXIÓN<br><span class="text-[9px] font-normal italic">Verifica la consola negra</span></td></tr>';
            }
        }

        function renderTable(data) {
            const body = document.getElementById('cuerpo');
            const lista = Array.isArray(data) ? data : (data.data || data.result || []);
            
            body.innerHTML = '';
            let suma = 0;

            if (lista.length === 0) {
                body.innerHTML = '<tr><td colspan="3" class="p-16 text-center text-slate-500">Sin facturas en Marzo 2026.</td></tr>';
                return;
            }

            lista.forEach(item => {
                const total = parseFloat(item.total || item.valor || 0);
                suma += total;
                body.innerHTML += `
                    <tr class="hover:bg-slate-700/50 transition-colors">
                        <td class="p-4 font-black text-blue-400">${item.numero || item.factura || 'N/A'}</td>
                        <td class="p-4 uppercase text-[10px] font-bold text-slate-300 leading-tight">${item.cliente || 'CONSUMIDOR'}</td>
                        <td class="p-4 text-right font-black text-white">$ ${total.toLocaleString()}</td>
                    </tr>`;
            });

            document.getElementById('neto').innerText = `$ ${suma.toLocaleString()}`;
            document.getElementById('cant').innerText = lista.length;
            log(`Reporte listo: ${lista.length} facturas de pyg50.`);
        }
    </script>
</body>
</html>
