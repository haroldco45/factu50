<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Distrileco - Dashboard PyG50</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0b0f1a] text-slate-300 min-h-screen font-sans">

    <nav class="bg-blue-600 p-4 shadow-2xl flex justify-between items-center border-b border-blue-500">
        <div class="flex items-center gap-2">
            <span class="bg-white text-blue-700 font-black px-2 rounded italic text-xl">D</span>
            <h1 class="text-lg font-black uppercase tracking-tighter text-white">Distrileco</h1>
        </div>
        <div id="connStatus" class="text-[10px] bg-red-900/50 text-red-400 px-3 py-1 rounded-full border border-red-500 font-bold uppercase">
            Desconectado
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-4">
        
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-6">
            <button onclick="llamarAPI('POST')" class="bg-orange-600 hover:bg-orange-700 text-white font-black py-4 rounded-2xl shadow-lg transition-all active:scale-95 border-b-4 border-orange-900 uppercase text-xs">
                🚀 1. Sincronizar Carga Masiva
            </button>
            <button onclick="llamarAPI('GET')" class="bg-slate-800 hover:bg-slate-700 border-2 border-blue-500 text-blue-400 font-black py-4 rounded-2xl shadow-md active:scale-95 transition-all uppercase text-xs">
                📊 2. Consultar Factu50
            </button>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-6">
            <div class="bg-slate-900 p-6 rounded-3xl border border-slate-800 shadow-inner text-center">
                <p class="text-emerald-500 text-[10px] font-black uppercase mb-1">Total Ventas</p>
                <p id="neto" class="text-2xl font-black text-white">$ 0</p>
            </div>
            <div class="bg-slate-900 p-6 rounded-3xl border border-slate-800 shadow-inner text-center">
                <p class="text-blue-500 text-[10px] font-black uppercase mb-1">Facturas</p>
                <p id="cant" class="text-2xl font-black text-white">0</p>
            </div>
        </div>

        <div class="bg-slate-900 rounded-3xl shadow-2xl overflow-hidden border border-slate-800">
            <table class="w-full text-left">
                <thead class="bg-slate-800 text-slate-500 text-[10px] font-black uppercase tracking-widest">
                    <tr>
                        <th class="p-4">Factura</th>
                        <th class="p-4">Cliente (pyg50)</th>
                        <th class="p-4 text-right">Valor</th>
                    </tr>
                </thead>
                <tbody id="cuerpo" class="divide-y divide-slate-800">
                    <tr><td colspan="3" class="p-16 text-center text-slate-600 italic">Presiona un botón para conectar...</td></tr>
                </tbody>
            </table>
        </div>

        <div id="debug" class="mt-6 p-4 bg-black text-emerald-500 font-mono text-[10px] rounded-2xl border border-slate-800 h-32 overflow-y-auto shadow-2xl">
            > App Vibras Positivas lista para Distrileco...
        </div>

    </main>

    <footer class="mt-10 p-8 text-center text-slate-600 text-[10px]">
        <p class="font-black text-blue-800 uppercase italic tracking-tighter">Desarrollado por Vibras Positivas</p>
        <p class="mt-1">Copyright &copy; 2026 | 3117700431</p>
    </footer>

    <script>
        const CFG = {
            base: "https://app.nexusai.com.co/ia/api",
            key: "3010d9ca2f0fec14cfe6bfaa8a9fc3d54249ef15a2ccf729d27d9ea7e26b0c12",
            tercero: "5e8883a1-6a7e-4cfa-92ea-fafde465a3d9",
            // Usamos un proxy que NO requiere activación previa
            proxy: "https://api.allorigins.win/get?url="
        };

        function log(msg) {
            const d = document.getElementById('debug');
            d.innerHTML += `<br>> ${msg}`;
            d.scrollTop = d.scrollHeight;
        }

        async function llamarAPI(metodo) {
            const body = document.getElementById('cuerpo');
            const status = document.getElementById('connStatus');
            body.innerHTML = '<tr><td colspan="3" class="p-16 text-center animate-pulse text-blue-500 font-bold uppercase tracking-widest">Conectando...</td></tr>';
            
            const endpoint = (metodo === 'POST') ? "/business/terceros/carga-masiva" : "/consultas/factu50";
            const fullUrl = `${CFG.base}${endpoint}?terceroId=${CFG.tercero}&periodo=202603&db=pyg50&api_key=${CFG.key}`;
            
            log(`Solicitando ${metodo} a Nexus AI...`);

            try {
                // AllOrigins nos permite saltar el bloqueo de GitHub
                const response = await fetch(CFG.proxy + encodeURIComponent(fullUrl));
                if (!response.ok) throw new Error("Error en el puente de conexión");
                
                const json = await response.json();
                // El contenido real viene como string en json.contents
                const data = JSON.parse(json.contents);
                
                log("¡Éxito! Datos recibidos de pyg50.");
                status.innerText = "Conectado";
                status.classList.replace('bg-red-900/50', 'bg-emerald-900/50');
                status.classList.replace('text-red-400', 'text-emerald-400');
                status.classList.replace('border-red-500', 'border-emerald-500');

                if (metodo === 'POST') {
                    alert("Carga Masiva Exitosa. Ahora actualiza el reporte.");
                    llamarAPI('GET');
                } else {
                    renderizar(data);
                }
            } catch (err) {
                log(`ERROR: ${err.message}`);
                body.innerHTML = '<tr><td colspan="3" class="p-16 text-center text-red-500 font-bold uppercase text-xs">Error de Conexión<br><span class="text-[9px] font-normal italic">Verifica la consola</span></td></tr>';
            }
        }

        function renderizar(data) {
            const body = document.getElementById('cuerpo');
            const netoEl = document.getElementById('neto');
            const cantEl = document.getElementById('cant');
            
            // Nexus puede devolver la lista en 'data' o ser la lista misma
            const lista = data.data || data.result || (Array.isArray(data) ? data : []);
            
            body.innerHTML = '';
            let suma = 0;

            if (lista.length === 0) {
                body.innerHTML = '<tr><td colspan="3" class="p-16 text-center text-slate-600">No se encontraron facturas.</td></tr>';
                return;
            }

            lista.forEach(i => {
                const total = parseFloat(i.total || i.valor || 0);
                suma += total;
                body.innerHTML += `
                    <tr class="hover:bg-slate-800 transition-colors">
                        <td class="p-4 font-black text-blue-400">${i.numero || i.factura}</td>
                        <td class="p-4 uppercase text-[10px] font-bold text-slate-300">${i.cliente || 'CLIENTE'}</td>
                        <td class="p-4 text-right font-black text-white italic">$ ${total.toLocaleString()}</td>
                    </tr>`;
            });

            netoEl.innerText = `$ ${suma.toLocaleString()}`;
            cantEl.innerText = lista.length;
            log(`Reporte cargado: ${lista.length} facturas.`);
        }
    </script>
</body>
</html>
