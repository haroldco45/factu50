<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Distrileco - Control de Facturación</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen font-sans">

    <nav class="bg-blue-800 text-white p-6 shadow-2xl flex justify-between items-center">
        <div>
            <h1 class="text-2xl font-black italic uppercase tracking-tighter">Distrileco</h1>
            <p class="text-[10px] font-bold opacity-80">Dashboard de Ventas | Marzo 2026</p>
        </div>
        <img src="https://haroldco45.github.io/factu50/logo_vibras.png" alt="VP" class="h-10 opacity-90 error-fallback">
    </nav>

    <main class="max-w-5xl mx-auto p-4 md:p-8">
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
            <button onclick="peticionNexus('POST', '/business/terceros/carga-masiva')" class="bg-orange-500 hover:bg-orange-600 text-white font-black p-5 rounded-2xl shadow-lg transition-all active:scale-95">
                🚀 1. SINCRONIZAR PYG50 (CARGA)
            </button>
            <button onclick="peticionNexus('GET', '/consultas/factu50')" class="bg-white border-4 border-blue-800 text-blue-800 font-black p-5 rounded-2xl shadow-md transition-all active:scale-95">
                📊 2. VER REPORTE DE MARZO
            </button>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-8 text-center">
            <div class="bg-white p-6 rounded-3xl shadow-sm border-b-8 border-green-500">
                <p class="text-gray-400 text-xs font-bold uppercase mb-1">Total Facturado</p>
                <p id="valTotal" class="text-3xl font-black text-gray-800">$ 0</p>
            </div>
            <div class="bg-white p-6 rounded-3xl shadow-sm border-b-8 border-blue-600">
                <p class="text-gray-400 text-xs font-bold uppercase mb-1">Documentos</p>
                <p id="valCant" class="text-3xl font-black text-gray-800">0</p>
            </div>
        </div>

        <div class="bg-white rounded-3xl shadow-2xl border border-gray-200 overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-gray-100 text-gray-500 text-[10px] font-black uppercase">
                    <tr>
                        <th class="p-5">Factura</th>
                        <th class="p-5">Cliente (pyg50)</th>
                        <th class="p-5 text-right">Valor</th>
                    </tr>
                </thead>
                <tbody id="tablaBody" class="divide-y divide-gray-100 text-sm">
                    <tr><td colspan="3" class="p-20 text-center text-gray-400 italic">Esperando acción...</td></tr>
                </tbody>
            </table>
        </div>

        <div id="debugLog" class="mt-6 p-4 bg-black text-green-400 font-mono text-[10px] rounded-xl overflow-x-auto hidden">
            > Sistema iniciado...
        </div>

    </main>

    <footer class="mt-12 p-10 text-center text-gray-400 text-[10px]">
        <p class="font-bold uppercase tracking-widest">App desarrollada por Vibras Positivas</p>
        <p>Derechos de autor (3117700431) · 2026</p>
    </footer>

    <script>
        const SETTINGS = {
            base: "https://app.nexusai.com.co/ia/api",
            key: "3010d9ca2f0fec14cfe6bfaa8a9fc3d54249ef15a2ccf729d27d9ea7e26b0c12",
            tercero: "5e8883a1-6a7e-4cfa-92ea-fafde465a3d9",
            // Proxy de respaldo para evitar el Error de Conexión (CORS)
            proxy: "https://api.allorigins.win/raw?url="
        };

        function logger(msg) {
            const logEl = document.getElementById('debugLog');
            logEl.classList.remove('hidden');
            logEl.innerText += `\n> ${msg}`;
        }

        async function peticionNexus(metodo, endpoint) {
            const body = document.getElementById('tablaBody');
            body.innerHTML = '<tr><td colspan="3" class="p-20 text-center text-blue-600 font-bold animate-pulse">CONECTANDO A PYG50...</td></tr>';
            
            const fullUrl = `${SETTINGS.base}${endpoint}?terceroId=${SETTINGS.tercero}&periodo=202603&db=pyg50`;
            
            try {
                logger(`Iniciando ${metodo} a ${endpoint}`);
                
                // Intentamos la petición usando el proxy para saltar el bloqueo
                const response = await fetch(SETTINGS.proxy + encodeURIComponent(fullUrl), {
                    method: 'GET', // Usamos GET a través del proxy para mayor compatibilidad
                    headers: {
                        'x-api-key': SETTINGS.key,
                        'Accept': 'application/json'
                    }
                });

                if (!response.ok) throw new Error(`HTTP ${response.status}`);

                const rawData = await response.json();
                logger("Datos recibidos correctamente.");
                
                // Si es carga masiva avisamos, si es consulta renderizamos
                if (endpoint.includes('carga')) {
                    alert("¡Sincronización de Distrileco Exitosa!");
                    peticionNexus('GET', '/consultas/factu50');
                } else {
                    renderizar(rawData);
                }

            } catch (err) {
                logger(`ERROR: ${err.message}`);
                body.innerHTML = `<tr><td colspan="3" class="p-20 text-center text-red-500 font-bold">⚠️ ERROR DE CONEXIÓN<br><span class="text-[10px] font-normal italic">Verifica la consola negra abajo para detalles</span></td></tr>`;
            }
        }

        function renderizar(data) {
            const body = document.getElementById('tablaBody');
            const totalEl = document.getElementById('valTotal');
            const cantEl = document.getElementById('valCant');
            
            // Nexus a veces devuelve la lista dentro de 'data' o 'result'
            const lista = Array.isArray(data) ? data : (data.data || data.result || []);
            
            body.innerHTML = '';
            let suma = 0;

            if (lista.length === 0) {
                body.innerHTML = '<tr><td colspan="3" class="p-20 text-center text-gray-400 font-bold uppercase text-xs tracking-widest text-red-400">No se encontraron datos de facturación</td></tr>';
                return;
            }

            lista.forEach(item => {
                const valor = parseFloat(item.total || item.valor || 0);
                suma += valor;
                body.innerHTML += `
                    <tr class="hover:bg-blue-50 transition-colors">
                        <td class="p-5 font-black text-gray-800">${item.numero || item.factura || 'N/A'}</td>
                        <td class="p-5">
                            <div class="font-bold text-gray-600 uppercase text-[11px]">${item.cliente || 'CLIENTE SIN NOMBRE'}</div>
                            <div class="text-[10px] text-gray-400 font-mono italic">${item.fecha || '2026-03'}</div>
                        </td>
                        <td class="p-5 text-right font-black text-blue-700">$ ${valor.toLocaleString()}</td>
                    </tr>
                `;
            });

            totalEl.innerText = `$ ${suma.toLocaleString()}`;
            cantEl.innerText = lista.length;
            logger(`Renderizado: ${lista.length} registros.`);
        }
    </script>
</body>
</html>
