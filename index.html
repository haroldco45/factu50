<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Distrileco - Dashboard de Facturación</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 font-sans min-h-screen">

    <nav class="bg-blue-700 text-white p-5 shadow-lg flex justify-between items-center">
        <div>
            <h1 class="text-xl font-black italic uppercase">Distrileco</h1>
            <p class="text-[10px] opacity-80 uppercase font-bold">Marzo 2026 | Factu50</p>
        </div>
        <div class="text-[10px] text-right">
            <p>App: Vibras Positivas</p>
            <p>ID: 3117700431</p>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-4">
        
        <div class="mb-6">
            <button onclick="ejecutarAccion('carga')" id="btnCarga" class="w-full bg-orange-600 hover:bg-orange-700 text-white font-black py-4 rounded-2xl shadow-xl transition-all active:scale-95 mb-3">
                🔄 SINCRONIZAR DATOS (CARGA MASIVA)
            </button>
            <button onclick="ejecutarAccion('consulta')" id="btnConsulta" class="w-full bg-white border-2 border-blue-700 text-blue-700 font-bold py-3 rounded-2xl shadow-md">
                📊 ACTUALIZAR REPORTE
            </button>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-6 text-center">
            <div class="bg-white p-5 rounded-3xl shadow-sm border-b-4 border-emerald-500">
                <p class="text-slate-400 text-[10px] font-bold uppercase">Total Facturado</p>
                <p id="txtTotal" class="text-2xl font-black text-slate-800">$ 0.00</p>
            </div>
            <div class="bg-white p-5 rounded-3xl shadow-sm border-b-4 border-blue-500">
                <p class="text-slate-400 text-[10px] font-bold uppercase">Facturas</p>
                <p id="txtCantidad" class="text-2xl font-black text-slate-800">0</p>
            </div>
        </div>

        <div class="bg-white rounded-3xl shadow-2xl overflow-hidden border border-slate-200">
            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm">
                    <thead class="bg-slate-100 text-slate-500 text-[10px] font-black uppercase">
                        <tr>
                            <th class="p-4">Factura</th>
                            <th class="p-4">Cliente</th>
                            <th class="p-4 text-right">Valor Neto</th>
                        </tr>
                    </thead>
                    <tbody id="tablaCuerpo" class="divide-y divide-slate-100">
                        <tr><td colspan="3" class="p-10 text-center text-slate-400 italic">Presiona el botón para cargar datos de pyg50...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div id="errorMsg" class="mt-4 p-4 bg-red-50 text-red-600 text-xs rounded-2xl hidden border border-red-200"></div>

    </main>

    <footer class="mt-10 p-8 text-center text-slate-400 text-[10px]">
        <p class="font-bold">App desarrollada por Vibras Positivas</p>
        <p>Derechos de autor (3117700431)</p>
    </footer>

    <script>
        const API = {
            base: "https://app.nexusai.com.co/ia/api",
            key: "3010d9ca2f0fec14cfe6bfaa8a9fc3d54249ef15a2ccf729d27d9ea7e26b0c12",
            tercero: "5e8883a1-6a7e-4cfa-92ea-fafde465a3d9",
            // ESTO ES CLAVE: Un puente para saltar el bloqueo de seguridad
            proxy: "https://api.allorigins.win/raw?url=" 
        };

        async function ejecutarAccion(tipo) {
            const tabla = document.getElementById('tablaCuerpo');
            const errorBox = document.getElementById('errorMsg');
            errorBox.classList.add('hidden');
            
            tabla.innerHTML = '<tr><td colspan="3" class="p-10 text-center text-blue-600 font-bold animate-pulse">CONECTANDO CON NEXUS AI...</td></tr>';

            // Definimos qué endpoint usar
            const endpoint = (tipo === 'carga') ? "/business/terceros/carga-masiva" : "/consultas/factu50";
            const metodo = (tipo === 'carga') ? "POST" : "GET";
            const params = `?terceroId=${API.tercero}&periodo=202603&db=pyg50`;

            try {
                // Construimos la URL final usando el puente de seguridad
                const urlFinal = API.proxy + encodeURIComponent(API.base + endpoint + params);

                const response = await fetch(urlFinal, {
                    method: metodo,
                    headers: { 'x-api-key': API.key }
                });

                if (!response.ok) throw new Error("Servidor no responde");

                const data = await response.json();
                
                if (tipo === 'carga') {
                    alert("¡Sincronización exitosa!");
                    ejecutarAccion('consulta');
                } else {
                    renderizar(data);
                }

            } catch (err) {
                errorBox.classList.remove('hidden');
                errorBox.innerHTML = `<strong>⚠️ Error:</strong> El navegador bloqueó la conexión.<br>Detalle: ${err.message}`;
                tabla.innerHTML = '<tr><td colspan="3" class="p-10 text-center text-red-300 italic">Fallo de comunicación</td></tr>';
            }
        }

        function renderizar(datos) {
            const tabla = document.getElementById('tablaCuerpo');
            tabla.innerHTML = '';
            let suma = 0;

            if (!datos || datos.length === 0) {
                tabla.innerHTML = '<tr><td colspan="3" class="p-10 text-center">No hay datos en marzo 2026.</td></tr>';
                return;
            }

            datos.forEach(f => {
                const v = parseFloat(f.total || f.valor || 0);
                suma += v;
                tabla.innerHTML += `
                    <tr>
                        <td class="p-4 font-bold text-slate-800">${f.numero || f.factura || 'N/A'}</td>
                        <td class="p-4 text-[11px] uppercase">${f.cliente || 'Desconocido'}</td>
                        <td class="p-4 text-right font-black text-blue-800">$${v.toLocaleString()}</td>
                    </tr>
                `;
            });

            document.getElementById('txtTotal').innerText = `$ ${suma.toLocaleString()}`;
            document.getElementById('txtCantidad').innerText = datos.length;
        }
    </script>
</body>
</html>
